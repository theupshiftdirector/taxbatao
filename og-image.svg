<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050508"/>
      <stop offset="100%" style="stop-color:#0a0e1a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- TUDI accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="#ff2d00"/>
  <!-- Site name -->
  <text x="600" y="260" text-anchor="middle" fill="#e2e8f0" font-family="system-ui,-apple-system,sans-serif" font-size="72" font-weight="800">Tax Batao</text>
  <!-- Tagline -->
  <text x="600" y="330" text-anchor="middle" fill="#64748b" font-family="system-ui,-apple-system,sans-serif" font-size="32" font-weight="500">Free Income Tax Calculator</text>
